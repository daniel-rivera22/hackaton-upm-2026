<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuard - Login & Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
    <div class="bg-blue-600 p-8 text-center text-white">
        <div class="text-5xl mb-2">⛈️</div>
        <h1 class="text-3xl font-black tracking-tight">GeoGuard</h1>
        <p class="text-blue-100 text-sm mt-1">Gestión Inteligente de Emergencias</p>
    </div>

    <div class="flex border-b">
        <button onclick="showTab('login')" id="tab-login" class="flex-1 py-4 font-bold text-blue-600 border-b-2 border-blue-600 transition">Iniciar sesión</button>
        <button onclick="showTab('registro')" id="tab-registro" class="flex-1 py-4 font-bold text-gray-400 hover:text-blue-600 transition">Registrarse</button>
    </div>

    <div class="p-8">
        <form id="form-login" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre de usuario</label>
                <input type="text" id="login-nick" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Contraseña</label>
                <input type="password" id="login-pass" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition">
                Acceder
            </button>
        </form>

        <form id="form-registro" class="hidden space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre de usuario</label>
                <input type="text" id="reg-nick" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Contraseña</label>
                <input type="password" id="reg-pass" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tipo de vivienda</label>
                    <select id="reg-vivienda" class="w-full border-2 border-slate-100 p-3 rounded-xl text-sm focus:border-blue-500 outline-none transition" required>
                        <option value="" disabled selected>Elegir vivienda</option>
                        <option value="Sótano">Sótano</option>
                        <option value="Planta baja">Planta baja</option>
                        <option value="Piso Alto">Piso alto</option>
                        <option value="Casa de campo">Casa de campo</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Provincia</label>
                    <select id="reg-provincia" class="w-full border-2 border-slate-100 p-3 rounded-xl text-sm focus:border-blue-500 outline-none transition" required>
                        <option value="" disabled selected>Elegir provincia</option>
                        <option value="Álava">Álava</option><option value="Albacete">Albacete</option><option value="Alicante">Alicante</option><option value="Almería">Almería</option><option value="Asturias">Asturias</option><option value="Ávila">Ávila</option><option value="Badajoz">Badajoz</option><option value="Barcelona">Barcelona</option><option value="Burgos">Burgos</option><option value="Cáceres">Cáceres</option><option value="Cádiz">Cádiz</option><option value="Cantabria">Cantabria</option><option value="Castellón">Castellón</option><option value="Ciudad Real">Ciudad Real</option><option value="Córdoba">Córdoba</option><option value="Cuenca">Cuenca</option><option value="Girona">Girona</option><option value="Granada">Granada</option><option value="Guadalajara">Guadalajara</option><option value="Gipuzkoa">Gipuzkoa</option><option value="Huelva">Huelva</option><option value="Huesca">Huesca</option><option value="Islas Baleares">Islas Baleares</option><option value="Jaén">Jaén</option><option value="La Coruña">La Coruña</option><option value="La Rioja">La Rioja</option><option value="Las Palmas">Las Palmas</option><option value="León">León</option><option value="Lleida">Lleida</option><option value="Lugo">Lugo</option><option value="Madrid">Madrid</option><option value="Málaga">Málaga</option><option value="Murcia">Murcia</option><option value="Navarra">Navarra</option><option value="Ourense">Ourense</option><option value="Palencia">Palencia</option><option value="Pontevedra">Pontevedra</option><option value="Salamanca">Salamanca</option><option value="Segovia">Segovia</option><option value="Sevilla">Sevilla</option><option value="Soria">Soria</option><option value="Tarragona">Tarragona</option><option value="Sta. Cruz de Tenerife">Sta. Cruz de Tenerife</option><option value="Teruel">Teruel</option><option value="Toledo">Toledo</option><option value="Valencia">Valencia</option><option value="Valladolid">Valladolid</option><option value="Bizkaia">Bizkaia</option><option value="Zamora">Zamora</option><option value="Zaragoza">Zaragoza</option><option value="Ceuta">Ceuta</option><option value="Melilla">Melilla</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Necesidades especiales</label>
                <div class="grid grid-cols-1 gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="necesidad" value="Silla de ruedas" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        Silla de ruedas
                    </label>
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="necesidad" value="Persona dependiente" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        Persona dependiente
                    </label>
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="necesidad" value="Mascotas" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        Mascotas
                    </label>
                    <div class="flex items-center gap-2">
                        <label class="text-sm text-gray-700">Otro:</label>
                        <input type="text" id="reg-necesidad-otro" placeholder="¿Cuál?" class="flex-1 bg-transparent border-b border-slate-300 text-sm focus:border-blue-500 outline-none transition px-1">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition shadow-xl mt-2">
                Crear perfil
            </button>
        </form>
    </div>
</div>

<script>
    function showTab(type) {
        const loginForm = document.getElementById('form-login');
        const regForm = document.getElementById('form-registro');
        const tabLogin = document.getElementById('tab-login');
        const tabReg = document.getElementById('tab-registro');

        if (type === 'login') {
            loginForm.classList.remove('hidden');
            regForm.classList.add('hidden');
            tabLogin.classList.add('border-blue-600', 'text-blue-600');
            tabReg.classList.remove('border-blue-600', 'text-blue-600');
            tabReg.classList.add('text-gray-400');
        } else {
            regForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            tabReg.classList.add('border-blue-600', 'text-blue-600');
            tabReg.classList.remove('text-gray-400');
            tabLogin.classList.remove('border-blue-600', 'text-blue-600');
            tabLogin.classList.add('text-gray-400');
        }
    }
</script>
</body>
</html>
