<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuard - Login & Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
    <div class="bg-blue-600 p-8 text-center text-white">
        <div class="text-5xl mb-2">⛈️</div>
        <h1 class="text-3xl font-black tracking-tight">GeoGuard</h1>
        <p class="text-blue-100 text-sm mt-1">Gestión Inteligente de Emergencias</p>
    </div>

    <div class="flex border-b">
        <button onclick="showTab('login')" id="tab-login" class="flex-1 py-4 font-bold text-blue-600 border-b-2 border-blue-600 transition">Iniciar sesión</button>
        <button onclick="showTab('registro')" id="tab-registro" class="flex-1 py-4 font-bold text-gray-400 hover:text-blue-600 transition">Registrarse</button>
    </div>

    <div class="p-8">
        <form id="form-login" action="/api/auth/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre de usuario</label>
                <input type="text" name="username" id="login-nick" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Contraseña</label>
                <input type="password" name="password" id="login-pass" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition">
                Acceder
            </button>
        </form>

        <form id="form-registro" action="/api/auth/registrar" method="POST" class="hidden space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre de usuario</label>
                <input type="text" name="username" id="reg-nick" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Contraseña</label>
                <input type="password" name="password" id="reg-pass" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tipo de vivienda</label>
                    <select name="tipoVivienda" id="reg-vivienda" class="w-full border-2 border-slate-100 p-3 rounded-xl text-sm focus:border-blue-500 outline-none transition" required>
                        <option value="" disabled selected>Elegir vivienda</option>
                        <option value="SOTANO">Sótano</option>
                        <option value="PLANTA_BAJA">Planta baja</option>
                        <option value="PISO_ALTO">Piso alto</option>
                        <option value="CASA_DE_CAMPO">Casa de campo</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Provincia</label>
                    <select name="provincia" id="reg-provincia" class="w-full border-2 border-slate-100 p-3 rounded-xl text-sm focus:border-blue-500 outline-none transition" required>
                        <option value="" disabled selected>Elegir provincia</option>
                        <option value="ALAVA">Álava</option>
                        <option value="ALBACETE">Albacete</option>
                        <option value="ALICANTE">Alicante</option>
                        <option value="ALMERIA">Almería</option>
                        <option value="ASTURIAS">Asturias</option>
                        <option value="AVILA">Ávila</option>
                        <option value="BADAJOZ">Badajoz</option>
                        <option value="BALEARES">Islas Baleares</option>
                        <option value="BARCELONA">Barcelona</option>
                        <option value="BURGOS">Burgos</option>
                        <option value="CACERES">Cáceres</option>
                        <option value="CADIZ">Cádiz</option>
                        <option value="CANTABRIA">Cantabria</option>
                        <option value="CASTELLON">Castellón</option>
                        <option value="CEUTA">Ceuta</option>
                        <option value="CIUDAD_REAL">Ciudad Real</option>
                        <option value="CORDOBA">Córdoba</option>
                        <option value="CUENCA">Cuenca</option>
                        <option value="GIRONA">Girona</option>
                        <option value="GRANADA">Granada</option>
                        <option value="GUADALAJARA">Guadalajara</option>
                        <option value="GUIPUZCOA">Gipuzkoa</option>
                        <option value="HUELVA">Huelva</option>
                        <option value="HUESCA">Huesca</option>
                        <option value="JAEN">Jaén</option>
                        <option value="LA_CORUNA">La Coruña</option>
                        <option value="LA_RIOJA">La Rioja</option>
                        <option value="LAS_PALMAS">Las Palmas</option>
                        <option value="LEON">León</option>
                        <option value="LLEIDA">Lleida</option>
                        <option value="LUGO">Lugo</option>
                        <option value="MADRID">Madrid</option>
                        <option value="MALAGA">Málaga</option>
                        <option value="MELILLA">Melilla</option>
                        <option value="MURCIA">Murcia</option>
                        <option value="NAVARRA">Navarra</option>
                        <option value="OURENSE">Ourense</option>
                        <option value="PALENCIA">Palencia</option>
                        <option value="PONTEVEDRA">Pontevedra</option>
                        <option value="SALAMANCA">Salamanca</option>
                        <option value="SANTA_CRUZ_DE_TENERIFE">Sta. Cruz de Tenerife</option>
                        <option value="SEGOVIA">Segovia</option>
                        <option value="SEVILLA">Sevilla</option>
                        <option value="SORIA">Soria</option>
                        <option value="TARRAGONA">Tarragona</option>
                        <option value="TERUEL">Teruel</option>
                        <option value="TOLEDO">Toledo</option>
                        <option value="VALENCIA">Valencia</option>
                        <option value="VALLADOLID">Valladolid</option>
                        <option value="VIZCAYA">Bizkaia</option>
                        <option value="ZAMORA">Zamora</option>
                        <option value="ZARAGOZA">Zaragoza</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Necesidades especiales</label>
                <div class="grid grid-cols-1 gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="tipoNecesidades" value="SILLA_RUEDAS" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        Silla de ruedas
                    </label>
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="tipoNecesidades" value="PERSONA_DEPENDIENTE" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        Persona dependiente
                    </label>
                    <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="tipoNecesidades" value="MASCOTAS" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        Mascotas
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition shadow-xl mt-2">
                Crear perfil
            </button>
        </form>
    </div>
</div>

<script>
    function showTab(type) {
        const loginForm = document.getElementById('form-login');
        const regForm = document.getElementById('form-registro');
        const tabLogin = document.getElementById('tab-login');
        const tabReg = document.getElementById('tab-registro');

        if (type === 'login') {
            loginForm.classList.remove('hidden');
            regForm.classList.add('hidden');
            tabLogin.classList.add('border-blue-600', 'text-blue-600');
            tabReg.classList.remove('border-blue-600', 'text-blue-600');
            tabReg.classList.add('text-gray-400');
        } else {
            regForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            tabReg.classList.add('border-blue-600', 'text-blue-600');
            tabReg.classList.remove('text-gray-400');
            tabLogin.classList.remove('border-blue-600', 'text-blue-600');
            tabLogin.classList.add('text-gray-400');
        }
    }
</script>
</body>
</html>
